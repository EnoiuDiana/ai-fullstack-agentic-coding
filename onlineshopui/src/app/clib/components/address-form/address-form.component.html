<form [formGroup]="form" class="space-y-4">
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <!-- Country -->
        <div>
            <label for="country" class="block text-sm font-medium text-text-muted mb-1">
                Country <span class="text-destructive">*</span>
            </label>
            <input
                type="text"
                id="country"
                formControlName="country"
                class="w-full px-3 py-2 border border-border rounded-md bg-surface text-text focus:ring-2 focus:ring-ring focus:border-transparent transition-colors"
                [class.border-destructive]="hasError('country')"
                [class.focus:ring-destructive]="hasError('country')"
                placeholder="e.g., USA"
            />
            @if (hasError('country')) {
                <p class="mt-1 text-sm text-destructive">{{ getErrorMessage('country') }}</p>
            }
        </div>

        <!-- City -->
        <div>
            <label for="city" class="block text-sm font-medium text-text-muted mb-1">
                City <span class="text-destructive">*</span>
            </label>
            <input
                type="text"
                id="city"
                formControlName="city"
                class="w-full px-3 py-2 border border-border rounded-md bg-surface text-text focus:ring-2 focus:ring-ring focus:border-transparent transition-colors"
                [class.border-destructive]="hasError('city')"
                [class.focus:ring-destructive]="hasError('city')"
                placeholder="e.g., Seattle"
            />
            @if (hasError('city')) {
                <p class="mt-1 text-sm text-destructive">{{ getErrorMessage('city') }}</p>
            }
        </div>

        <!-- County -->
        <div>
            <label for="county" class="block text-sm font-medium text-text-muted mb-1">
                County <span class="text-destructive">*</span>
            </label>
            <input
                type="text"
                id="county"
                formControlName="county"
                class="w-full px-3 py-2 border border-border rounded-md bg-surface text-text focus:ring-2 focus:ring-ring focus:border-transparent transition-colors"
                [class.border-destructive]="hasError('county')"
                [class.focus:ring-destructive]="hasError('county')"
                placeholder="e.g., King"
            />
            @if (hasError('county')) {
                <p class="mt-1 text-sm text-destructive">{{ getErrorMessage('county') }}</p>
            }
        </div>

        <!-- Street Address -->
        <div>
            <label for="streetAddress" class="block text-sm font-medium text-text-muted mb-1">
                Street Address <span class="text-destructive">*</span>
            </label>
            <input
                type="text"
                id="streetAddress"
                formControlName="streetAddress"
                class="w-full px-3 py-2 border border-border rounded-md bg-surface text-text focus:ring-2 focus:ring-ring focus:border-transparent transition-colors"
                [class.border-destructive]="hasError('streetAddress')"
                [class.focus:ring-destructive]="hasError('streetAddress')"
                placeholder="e.g., 123 Pine Street"
            />
            @if (hasError('streetAddress')) {
                <p class="mt-1 text-sm text-destructive">{{ getErrorMessage('streetAddress') }}</p>
            }
        </div>
    </div>
</form>
